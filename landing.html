<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hisham Khashman | Language Selection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-900 font-sans leading-relaxed">

    <header class="bg-slate-900 text-white py-12 px-6 shadow-xl">
        <div class="max-w-6xl mx-auto">
            <h1 class="text-3xl font-bold tracking-tight">HISHAM KHASHMAN</h1>
            <p class="text-blue-400 text-lg mt-2">Select Language</p>
            <p class="text-slate-400 text-sm mt-1">Choose your preferred CV language.</p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-10">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <a href="index.html" class="block bg-white border-2 border-slate-200 rounded-lg p-5 hover:border-blue-500 transition">
                <div class="flex items-center justify-between">
                    <h2 class="text-lg font-bold text-slate-800">English</h2>
                    <i class="fas fa-chevron-right text-slate-400"></i>
                </div>
                <p class="text-sm text-slate-500 mt-2">View the English CV.</p>
            </a>
            <a href="index-ja.html" class="block bg-white border-2 border-slate-200 rounded-lg p-5 hover:border-blue-500 transition">
                <div class="flex items-center justify-between">
                    <h2 class="text-lg font-bold text-slate-800">Japanese</h2>
                    <i class="fas fa-chevron-right text-slate-400"></i>
                </div>
                <p class="text-sm text-slate-500 mt-2">View the Japanese CV.</p>
            </a>
            <a href="index-es.html" class="block bg-white border-2 border-slate-200 rounded-lg p-5 hover:border-blue-500 transition">
                <div class="flex items-center justify-between">
                    <h2 class="text-lg font-bold text-slate-800">Spanish</h2>
                    <i class="fas fa-chevron-right text-slate-400"></i>
                </div>
                <p class="text-sm text-slate-500 mt-2">View the Spanish CV.</p>
            </a>
            <a href="index-ar.html" class="block bg-white border-2 border-slate-200 rounded-lg p-5 hover:border-blue-500 transition">
                <div class="flex items-center justify-between">
                    <h2 class="text-lg font-bold text-slate-800">Arabic</h2>
                    <i class="fas fa-chevron-right text-slate-400"></i>
                </div>
                <p class="text-sm text-slate-500 mt-2">View the Arabic CV.</p>
            </a>
        </div>
        <p class="text-xs text-slate-500 mt-6">If a translation is not ready yet, the page will show a placeholder.</p>
    </main>

</body>
</html>
